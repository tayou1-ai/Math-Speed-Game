<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Speedy Math Kitchen &amp; Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF7F0;
    --ink:#3A2A20;
  }
  /* Food / bakery theme */
  body.theme-food{
    --bg1:#FFF3DD;
    --bg2:#FFE1B8;
    --accent:#FF6B5E;
    --accent2:#3FBF9F;
    --card:#FFFFFF;
    --card-edge:#FFD166;
    --text:#5B3A29;
    --sub:#9C7A5B;
    --shadow: rgba(255,107,94,0.25);
  }
  /* Ballet / studio theme */
  body.theme-ballet{
    --bg1:#F6E9F1;
    --bg2:#E9DAF2;
    --accent:#B4457A;
    --accent2:#8E6CC7;
    --card:#FFFFFF;
    --card-edge:#F2C94C;
    --text:#4A2E45;
    --sub:#93728C;
    --shadow: rgba(180,69,122,0.25);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Nunito',sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    background-attachment:fixed;
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    transition:background 0.4s ease;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
  }
  h1,h2,h3{font-family:'Fredoka',sans-serif; margin:0;}
  .app{width:100%; max-width:520px;}
  .screen{display:none;}
  .screen.active{display:block; animation:fadeUp .35s ease;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);}}

  /* ---------- Start screen ---------- */
  .title-block{text-align:center; margin-bottom:28px;}
  .title-block h1{font-size:1.9rem; color:#5B3A29;}
  .title-block .stage{
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:1rem; letter-spacing:.08em;
    text-transform:uppercase; color:#B4457A; opacity:.75; margin-bottom:6px;
  }
  .player-picks{display:flex; flex-direction:column; gap:18px;}
  .player-card{
    border-radius:28px; padding:22px 20px; cursor:pointer; border:none; text-align:left;
    display:flex; align-items:center; gap:16px;
    box-shadow:0 10px 24px rgba(0,0,0,0.08);
    transform:scale(1); transition:transform .15s ease, box-shadow .15s ease;
    font-family:'Nunito',sans-serif;
  }
  .player-card:active{transform:scale(0.97);}
  .player-card.food{background:linear-gradient(135deg,#FFF3DD,#FFE1B8); border:3px solid #FFD166;}
  .player-card.ballet{background:linear-gradient(135deg,#F6E9F1,#EAD9F2); border:3px solid #F2C94C;}
  .player-card .emoji{font-size:2.6rem; line-height:1;}
  .player-card .label{flex:1;}
  .player-card .label .name{font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.25rem; color:#4A2E45;}
  .player-card.food .label .name{color:#5B3A29;}
  .player-card .label .desc{font-size:0.9rem; color:#8a6f7f; margin-top:2px;}
  .player-card.food .label .desc{color:#9C7A5B;}
  .player-card .arrow{font-size:1.4rem; opacity:.5;}

  /* ---------- Game screen ---------- */
  .hud{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:18px; font-family:'Fredoka',sans-serif;
  }
  .hud .chip{
    background:var(--card); border-radius:16px; padding:8px 14px;
    box-shadow:0 4px 10px var(--shadow);
    font-weight:600; font-size:0.95rem; color:var(--text);
    display:flex; align-items:center; gap:6px;
  }
  .timer-wrap{flex:1; margin:0 12px;}
  .timer-track{background:rgba(0,0,0,0.08); border-radius:20px; height:14px; overflow:hidden;}
  .timer-fill{height:100%; width:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:20px; transition:width 1s linear;}

  /* signature stage / order-ticket element */
  .problem-stage{
    position:relative; border-radius:32px; background:var(--card);
    padding:38px 24px 30px; text-align:center;
    box-shadow:0 18px 40px var(--shadow);
    margin-bottom:22px; overflow:hidden;
    border:3px solid var(--card-edge);
  }
  body.theme-ballet .problem-stage::before{
    content:""; position:absolute; inset:0;
    background: radial-gradient(circle at 50% -10%, rgba(242,201,76,0.35), transparent 60%);
    pointer-events:none;
  }
  body.theme-food .problem-stage::before{
    content:""; position:absolute; top:-10px; left:0; right:0; text-align:center;
    font-size:0.75rem; letter-spacing:.25em; text-transform:uppercase; color:var(--sub);
  }
  .ticket-label{
    font-family:'Fredoka',sans-serif; font-size:0.75rem; letter-spacing:.2em; text-transform:uppercase;
    color:var(--accent); opacity:.8; margin-bottom:10px;
  }
  .visual-row{font-size:1.6rem; letter-spacing:4px; margin-bottom:6px; min-height:2.2rem;}
  .problem-text{font-family:'Fredoka',sans-serif; font-weight:600; font-size:2.6rem; color:var(--text); margin:6px 0 4px;}
  .feedback{min-height:1.4rem; font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.05rem;}
  .feedback.correct{color:#3FBF9F;}
  .feedback.wrong{color:var(--accent);}

  .answer-input{
    font-family:'Fredoka',sans-serif; font-size:2.2rem; text-align:center;
    width:140px; margin:14px auto 0; padding:8px 10px; border-radius:16px;
    border:3px solid var(--card-edge); background:#fffefb; color:var(--text);
    display:block;
  }

  .choices{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px;}
  .choice-btn{
    font-family:'Fredoka',sans-serif; font-size:1.6rem; font-weight:600;
    padding:16px 8px; border-radius:18px; border:none; cursor:pointer;
    background:linear-gradient(135deg, var(--bg1), var(--bg2)); color:var(--text);
    box-shadow:0 6px 14px rgba(0,0,0,0.08);
    transition:transform .1s ease;
  }
  .choice-btn:active{transform:scale(0.95);}
  .choice-btn.correct-flash{background:linear-gradient(135deg,#c8f5e8,#9fe8cf); color:#1c6b52;}
  .choice-btn.wrong-flash{background:linear-gradient(135deg,#ffd8d3,#ffb3a8); color:#8a2f22;}

  .numpad{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:16px;}
  .numpad button{
    font-family:'Fredoka',sans-serif; font-size:1.5rem; font-weight:600;
    padding:14px 0; border-radius:16px; border:none; cursor:pointer;
    background:linear-gradient(135deg, var(--bg1), var(--bg2)); color:var(--text);
    box-shadow:0 4px 10px rgba(0,0,0,0.06);
  }
  .numpad button:active{transform:scale(0.94);}
  .numpad .wide{grid-column:span 1;}
  .numpad .enter{background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#fff;}
  .numpad .clear{background:#eee; color:#888;}

  .back-link{
    display:inline-block; margin-top:18px; font-family:'Fredoka',sans-serif; font-weight:600;
    color:var(--sub); text-decoration:none; font-size:0.9rem; cursor:pointer; text-align:center; width:100%;
  }

  /* ---------- End screen ---------- */
  .end-card{
    background:var(--card); border-radius:32px; padding:34px 26px; text-align:center;
    box-shadow:0 18px 40px var(--shadow); border:3px solid var(--card-edge);
  }
  .end-card .big-emoji{font-size:3.4rem; margin-bottom:6px;}
  .end-card h2{font-size:1.6rem; margin-bottom:4px; color:var(--text);}
  .stat-row{display:flex; justify-content:center; gap:26px; margin:20px 0;}
  .stat{display:flex; flex-direction:column; align-items:center;}
  .stat .num{font-family:'Fredoka',sans-serif; font-size:2rem; font-weight:600; color:var(--accent);}
  .stat .lbl{font-size:0.8rem; color:var(--sub); text-transform:uppercase; letter-spacing:.08em;}
  .stars{font-size:1.8rem; margin-bottom:14px;}
  .primary-btn{
    font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:#fff;
    background:linear-gradient(135deg,var(--accent2),var(--accent));
    border:none; border-radius:20px; padding:14px 28px; cursor:pointer;
    box-shadow:0 10px 22px var(--shadow); width:100%; margin-top:6px;
  }
  .primary-btn:active{transform:scale(0.97);}
  .secondary-btn{
    background:none; border:none; font-family:'Fredoka',sans-serif; font-weight:600;
    color:var(--sub); margin-top:14px; cursor:pointer; font-size:0.95rem;
  }

  @media (max-width:380px){
    .problem-text{font-size:2.1rem;}
    .player-card .emoji{font-size:2.1rem;}
  }
</style>
</head>
<body class="theme-food">

<div class="app">

  <!-- START SCREEN -->
  <div class="screen active" id="screen-start">
    <div class="title-block">
      <div class="stage">Speedy Math</div>
      <h1>Kitchen &amp; Studio 🧁🩰</h1>
    </div>
    <div class="player-picks">
      <button class="player-card food" data-player="food">
        <div class="emoji">🧁</div>
        <div class="label">
          <div class="name">Cupcake Counter</div>
          <div class="desc">Grade 1 · counting &amp; adding treats</div>
        </div>
        <div class="arrow">→</div>
      </button>
      <button class="player-card ballet" data-player="ballet">
        <div class="emoji">🩰</div>
        <div class="label">
          <div class="name">Ballet Bootcamp</div>
          <div class="desc">Grade 4 · times tables &amp; big sums</div>
        </div>
        <div class="arrow">→</div>
      </button>
    </div>
  </div>

  <!-- MODE PICK SCREEN -->
  <div class="screen" id="screen-modepick">
    <div class="title-block">
      <div class="stage" id="modepickStage">Cupcake Counter</div>
      <h1>Choose your challenge</h1>
    </div>
    <div class="player-picks">
      <button class="player-card" id="modeArithmetic" data-submode="arithmetic">
        <div class="emoji">🔢</div>
        <div class="label">
          <div class="name">Number Speedrun</div>
          <div class="desc" id="modeArithDesc">Adding &amp; counting treats</div>
        </div>
        <div class="arrow">→</div>
      </button>
      <button class="player-card" id="modePattern" data-submode="pattern">
        <div class="emoji">🧩</div>
        <div class="label">
          <div class="name">Pattern Detective</div>
          <div class="desc" id="modePatternDesc">Spot what comes next</div>
        </div>
        <div class="arrow">→</div>
      </button>
    </div>
    <a class="back-link" id="modepickBack">← choose a different player</a>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="screen-game">
    <div class="hud">
      <div class="chip">⭐ <span id="score">0</span></div>
      <div class="timer-wrap"><div class="timer-track"><div class="timer-fill" id="timerFill"></div></div></div>
      <div class="chip">🔥 <span id="streak">0</span></div>
    </div>

    <div class="problem-stage">
      <div class="ticket-label" id="ticketLabel">Order up</div>
      <div class="visual-row" id="visualRow"></div>
      <div class="problem-text" id="problemText">? + ?</div>
      <div class="feedback" id="feedback">&nbsp;</div>

      <div id="choicesWrap" class="choices" style="display:none;"></div>

      <div id="numpadWrap" style="display:none;">
        <input class="answer-input" id="answerInput" readonly value="">
        <div class="numpad">
          <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
          <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
          <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
          <button class="clear" data-key="clear">C</button><button data-key="0">0</button><button class="enter" data-key="enter">✓</button>
        </div>
      </div>
    </div>

    <a class="back-link" id="quitLink">← choose a different player</a>
  </div>

  <!-- END SCREEN -->
  <div class="screen" id="screen-end">
    <div class="end-card">
      <div class="big-emoji" id="endEmoji">🎉</div>
      <h2 id="endTitle">Great job!</h2>
      <div class="stars" id="endStars">⭐⭐⭐</div>
      <div class="stat-row">
        <div class="stat"><div class="num" id="endScore">0</div><div class="lbl">Points</div></div>
        <div class="stat"><div class="num" id="endBest">0</div><div class="lbl">Best Streak</div></div>
        <div class="stat"><div class="num" id="endSolved">0</div><div class="lbl">Solved</div></div>
      </div>
      <button class="primary-btn" id="playAgainBtn">Play again</button>
      <button class="secondary-btn" id="switchBtn">Choose different player</button>
    </div>
  </div>

</div>

<script>
(function(){
  const GAME_LENGTH = 60; // seconds
  const body = document.body;
  const screens = {
    start: document.getElementById('screen-start'),
    modepick: document.getElementById('screen-modepick'),
    game: document.getElementById('screen-game'),
    end: document.getElementById('screen-end'),
  };
  function showScreen(name){
    Object.values(screens).forEach(s=>s.classList.remove('active'));
    screens[name].classList.add('active');
  }

  let mode = 'food'; // 'food' (grade1) or 'ballet' (grade4)
  let subMode = 'arithmetic'; // 'arithmetic' or 'pattern'
  let chosenPlayer = 'food';
  let score = 0, streak = 0, bestStreak = 0, solved = 0;
  let timeLeft = GAME_LENGTH, timerId = null;
  let current = null; // {text, answer, visual}
  let currentAnswer = '';

  const scoreEl = document.getElementById('score');
  const streakEl = document.getElementById('streak');
  const timerFill = document.getElementById('timerFill');
  const problemText = document.getElementById('problemText');
  const visualRow = document.getElementById('visualRow');
  const ticketLabel = document.getElementById('ticketLabel');
  const feedback = document.getElementById('feedback');
  const choicesWrap = document.getElementById('choicesWrap');
  const numpadWrap = document.getElementById('numpadWrap');
  const answerInput = document.getElementById('answerInput');

  const foodEmojis = ['🍓','🍩','🧁','🍪','🍇','🍎','🍊','🍬'];
  const balletEmojis = ['🩰','⭐','🎀','💫'];

  const foodTickets = ['Order up!','Fresh batch!','Bakery counter','Sweet delivery','Tasty tally'];
  const balletTickets = ['Center stage','Warm-up combo','Rehearsal drill','Spotlight sum','Encore round'];
  const foodPatternTickets = ['Spot the pattern!','What comes next?','Pattern hunt','Sweet sequence'];
  const balletPatternTickets = ['Find the rule','Pattern rehearsal','Sequence spotlight','Logic combo'];

  function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

  function genFoodProblem(){
    // Grade 1: addition/subtraction within 20, mostly within 10-12, visual counting
    const useSub = Math.random() < 0.35;
    let a,b,answer,opSym;
    if(useSub){
      a = rnd(5,18); b = rnd(1, Math.min(a,9));
      answer = a-b; opSym = '−';
    } else {
      a = rnd(1,10); b = rnd(1,9);
      answer = a+b; opSym = '+';
    }
    const emoji = foodEmojis[rnd(0,foodEmojis.length-1)];
    const visualCount = Math.min(a, 12);
    const visual = emoji.repeat(visualCount);
    // multiple choice answers
    const opts = new Set([answer]);
    while(opts.size < 4){
      const delta = rnd(-3,3);
      const val = answer + delta;
      if(val >= 0 && val !== answer) opts.add(val);
    }
    return {
      display: `${a} ${opSym} ${b} =`,
      answer,
      visual,
      choices: shuffle([...opts]),
      mode:'choice'
    };
  }

  function genBalletProblem(){
    // Grade 4: multiplication tables 2-12, or addition/subtraction with 2-3 digit numbers, or simple division
    const type = rnd(0,2);
    let a,b,answer,opSym;
    if(type === 0){
      a = rnd(2,12); b = rnd(2,12);
      answer = a*b; opSym = '×';
    } else if(type === 1){
      a = rnd(20,99); b = rnd(10,a);
      answer = a-b; opSym = '−';
      if (Math.random() < 0.5){ a = rnd(15,60); b = rnd(15,60); answer = a+b; opSym='+'; }
    } else {
      b = rnd(2,10); answer = rnd(2,12); a = b*answer; opSym = '÷';
    }
    return {
      display: `${a} ${opSym} ${b} =`,
      answer,
      visual:'',
      mode:'type'
    };
  }

  function genFoodPatternProblem(){
    // Grade 1: skip-counting sequences, or a repeating two-item emoji pattern — both tap-to-answer
    const patternType = rnd(0,1);
    if(patternType === 0){
      const step = [1,2,5,10][rnd(0,3)];
      const start = rnd(0,10);
      const seq = [start, start+step, start+step*2, start+step*3];
      const answer = start + step*4;
      const opts = new Set([answer]);
      while(opts.size < 4){
        const delta = rnd(-2,2) * step || step;
        const val = answer + delta;
        if(val >= 0 && val !== answer) opts.add(val);
      }
      return {
        display: seq.join(' , ') + ' , ?',
        answer,
        visual:'',
        choices: shuffle([...opts]),
        mode:'choice'
      };
    } else {
      let e1 = foodEmojis[rnd(0,foodEmojis.length-1)];
      let e2 = foodEmojis[rnd(0,foodEmojis.length-1)];
      while(e2 === e1) e2 = foodEmojis[rnd(0,foodEmojis.length-1)];
      const seq = [e1,e2,e1,e2,e1]; // next should be e2
      const answer = e2;
      const wrongPool = foodEmojis.filter(e => e!==e1 && e!==e2);
      const opts = new Set([answer]);
      while(opts.size < 4){
        opts.add(wrongPool[rnd(0,wrongPool.length-1)]);
      }
      return {
        display: '',
        answer,
        visual: seq.join('') + '❓',
        choices: shuffle([...opts]),
        mode:'choice'
      };
    }
  }

  function genBalletPatternProblem(){
    // Grade 4: skip-count sequences (incl. descending), doubling sequences, or Fibonacci-style sum rules — typed answer
    const type = rnd(0,2);
    let seq = [], answer;
    if(type === 0){
      const step = [3,4,6,7,8,9,11,12][rnd(0,7)];
      const descending = Math.random() < 0.4;
      const start = rnd(8,45);
      for(let i=0;i<4;i++) seq.push(descending ? start - step*i : start + step*i);
      answer = descending ? start - step*4 : start + step*4;
    } else if(type === 1){
      const start = rnd(2,6);
      seq = [start];
      for(let i=1;i<4;i++) seq.push(seq[i-1]*2);
      answer = seq[3]*2;
    } else {
      const a = rnd(1,5), b = rnd(a+1, a+6);
      seq = [a,b];
      for(let i=2;i<4;i++) seq.push(seq[i-1]+seq[i-2]);
      answer = seq[2] + seq[3];
    }
    return {
      display: seq.join(' , ') + ' , ?',
      answer,
      visual:'',
      mode:'type'
    };
  }

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
  }

  function nextProblem(){
    if(subMode === 'arithmetic'){
      current = mode === 'food' ? genFoodProblem() : genBalletProblem();
    } else {
      current = mode === 'food' ? genFoodPatternProblem() : genBalletPatternProblem();
    }
    currentAnswer = '';
    problemText.textContent = current.display;
    visualRow.textContent = current.visual || '';
    feedback.textContent = '\u00A0';
    feedback.className = 'feedback';

    let tickets;
    if(subMode === 'arithmetic') tickets = mode === 'food' ? foodTickets : balletTickets;
    else tickets = mode === 'food' ? foodPatternTickets : balletPatternTickets;
    ticketLabel.textContent = tickets[rnd(0,tickets.length-1)];

    if(current.mode === 'choice'){
      choicesWrap.style.display = 'grid';
      numpadWrap.style.display = 'none';
      choicesWrap.innerHTML = '';
      current.choices.forEach(val=>{
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = val;
        btn.addEventListener('click', ()=>handleChoiceAnswer(val, btn));
        choicesWrap.appendChild(btn);
      });
    } else {
      choicesWrap.style.display = 'none';
      numpadWrap.style.display = 'block';
      answerInput.value = '';
    }
  }

  function handleChoiceAnswer(val, btnEl){
    const correct = val === current.answer;
    Array.from(choicesWrap.children).forEach(b=>b.disabled = true);
    btnEl.classList.add(correct ? 'correct-flash' : 'wrong-flash');
    if(!correct){
      Array.from(choicesWrap.children).forEach(b=>{
        if(b.textContent === String(current.answer)) b.classList.add('correct-flash');
      });
    }
    registerResult(correct);
    setTimeout(nextProblem, correct ? 450 : 900);
  }

  function handleTypedSubmit(){
    if(currentAnswer === '') return;
    const val = parseInt(currentAnswer,10);
    const correct = val === current.answer;
    registerResult(correct);
    if(!correct){
      feedback.textContent = `Answer: ${current.answer}`;
      feedback.className = 'feedback wrong';
    }
    setTimeout(nextProblem, correct ? 350 : 850);
  }

  function registerResult(correct){
    solved++;
    if(correct){
      streak++;
      bestStreak = Math.max(bestStreak, streak);
      const bonus = streak >= 5 ? 3 : streak >= 3 ? 2 : 1;
      score += bonus;
      feedback.textContent = streak >= 3 ? `Nice streak! +${bonus}` : 'Correct!';
      feedback.className = 'feedback correct';
    } else {
      streak = 0;
    }
    scoreEl.textContent = score;
    streakEl.textContent = streak;
  }

  numpadWrap.addEventListener('click', (e)=>{
    const key = e.target.getAttribute('data-key');
    if(!key) return;
    if(key === 'clear'){ currentAnswer=''; }
    else if(key === 'enter'){ handleTypedSubmit(); return; }
    else {
      if(currentAnswer.length < 4) currentAnswer += key;
    }
    answerInput.value = currentAnswer;
  });

  function startGame(chosenMode, chosenSubMode){
    mode = chosenMode;
    subMode = chosenSubMode || subMode;
    body.className = 'theme-' + mode;
    score = 0; streak = 0; bestStreak = 0; solved = 0; timeLeft = GAME_LENGTH;
    scoreEl.textContent = 0; streakEl.textContent = 0;
    timerFill.style.width = '100%';
    showScreen('game');
    nextProblem();
    clearInterval(timerId);
    timerId = setInterval(()=>{
      timeLeft--;
      timerFill.style.width = Math.max(0,(timeLeft/GAME_LENGTH)*100) + '%';
      if(timeLeft <= 0){
        clearInterval(timerId);
        endGame();
      }
    }, 1000);
  }

  function endGame(){
    showScreen('end');
    document.getElementById('endScore').textContent = score;
    document.getElementById('endBest').textContent = bestStreak;
    document.getElementById('endSolved').textContent = solved;
    const ratio = solved > 0 ? score / Math.max(solved,1) : 0;
    let starCount = 1;
    if(score >= 15) starCount = 2;
    if(score >= 30) starCount = 3;
    document.getElementById('endStars').textContent = '⭐'.repeat(starCount) + '☆'.repeat(3-starCount);
    document.getElementById('endEmoji').textContent = mode === 'food' ? '🧁' : '🩰';
    document.getElementById('endTitle').textContent = mode === 'food'
      ? (starCount === 3 ? 'Master Baker!' : starCount === 2 ? 'Sweet work!' : 'Yummy effort!')
      : (starCount === 3 ? 'Prima ballerina!' : starCount === 2 ? 'Beautiful form!' : 'Great rehearsal!');
  }

  function openModePick(player){
    chosenPlayer = player;
    const arithCard = document.getElementById('modeArithmetic');
    const patternCard = document.getElementById('modePattern');
    arithCard.classList.remove('food','ballet');
    patternCard.classList.remove('food','ballet');
    arithCard.classList.add(player);
    patternCard.classList.add(player);
    document.getElementById('modepickStage').textContent = player === 'food' ? 'Cupcake Counter' : 'Ballet Bootcamp';
    document.getElementById('modeArithDesc').textContent = player === 'food' ? 'Adding & counting treats' : 'Times tables & big sums';
    document.getElementById('modePatternDesc').textContent = player === 'food' ? 'Spot what comes next' : 'Crack the number rule';
    showScreen('modepick');
  }

  document.querySelectorAll('#screen-start .player-card').forEach(card=>{
    card.addEventListener('click', ()=> openModePick(card.getAttribute('data-player')));
  });
  document.querySelectorAll('#screen-modepick .player-card').forEach(card=>{
    card.addEventListener('click', ()=> startGame(chosenPlayer, card.getAttribute('data-submode')));
  });
  document.getElementById('modepickBack').addEventListener('click', ()=> showScreen('start'));
  document.getElementById('quitLink').addEventListener('click', ()=>{
    clearInterval(timerId);
    showScreen('start');
  });
  document.getElementById('playAgainBtn').addEventListener('click', ()=> startGame(mode, subMode));
  document.getElementById('switchBtn').addEventListener('click', ()=> showScreen('start'));

})();
</script>
</body>
</html>
